<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Admin Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
  th { cursor: pointer; }
</style>
</head>
<body class="p-4">

<h2>Hospital Admin Dashboard</h2>
<hr>

<div class="mb-3 d-flex justify-content-between">
  <input type="text" id="searchInput" class="form-control w-50" placeholder="Search by name, email, city, blood group...">
  <button class="btn btn-primary ms-2" onclick="sendAlerts()">Send Alert to Selected</button>
</div>

<table class="table table-bordered" id="usersTable">
  <thead class="table-light">
    <tr>
      <th><input type="checkbox" id="selectAll"></th>
      <th onclick="sortTable(1)">Name ▲▼</th>
      <th onclick="sortTable(2)">Email ▲▼</th>
      <th onclick="sortTable(3)">Phone ▲▼</th>
      <th onclick="sortTable(4)">Age ▲▼</th>
      <th onclick="sortTable(5)">Gender ▲▼</th>
      <th onclick="sortTable(6)">Blood Group ▲▼</th>
      <th onclick="sortTable(7)">City ▲▼</th>
    </tr>
  </thead>
  <tbody id="usersBody">
    <!-- Users will be loaded here -->
  </tbody>
</table>

<nav>
  <ul class="pagination" id="pagination"></ul>
</nav>

<script>
let usersData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 5;

async function fetchUsers() {
  try {
    const res = await fetch("/admin/users");
    const data = await res.json();
    usersData = data.users;
    filteredData = [...usersData];
    renderTable();
    renderPagination();
  } catch (err) {
    alert("Failed to load users: " + err);
  }
}

function renderTable() {
  const tbody = document.getElementById("usersBody");
  tbody.innerHTML = "";
  const start = (currentPage - 1) * rowsPerPage;
  const end = start + rowsPerPage;
  const pageUsers = filteredData.slice(start, end);

  pageUsers.forEach(user => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><input type="checkbox" class="userCheckbox" value="${user.email}"></td>
      <td>${user.name || ""}</td>
      <td>${user.email || ""}</td>
      <td>${user.phone || ""}</td>
      <td>${user.age || ""}</td>
      <td>${user.gender || ""}</td>
      <td>${user.bloodGroup || ""}</td>
      <td>${user.city || ""}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderPagination() {
  const totalPages = Math.ceil(filteredData.length / rowsPerPage);
  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const li = document.createElement("li");
    li.className = "page-item " + (i === currentPage ? "active" : "");
    li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
    li.addEventListener("click", () => {
      currentPage = i;
      renderTable();
      renderPagination();
    });
    pagination.appendChild(li);
  }
}

let sortDir = {};
function sortTable(colIndex) {
  const keyMap = {1:"name",2:"email",3:"phone",4:"age",5:"gender",6:"bloodGroup",7:"city"};
  const key = keyMap[colIndex];
  sortDir[key] = !sortDir[key];
  filteredData.sort((a,b) => {
    if ((a[key]||"").toString().toLowerCase() > (b[key]||"").toString().toLowerCase()) return sortDir[key]?1:-1;
    if ((a[key]||"").toString().toLowerCase() < (b[key]||"").toString().toLowerCase()) return sortDir[key]?-1:1;
    return 0;
  });
  renderTable();
}

document.getElementById("selectAll").addEventListener("click", function(){
  document.querySelectorAll(".userCheckbox").forEach(cb => cb.checked = this.checked);
});

function sendAlerts() {
  const selectedEmails = Array.from(document.querySelectorAll(".userCheckbox:checked"))
                              .map(cb => cb.value);
  if(selectedEmails.length === 0) { alert("No users selected"); return; }

  fetch("/admin/send_alerts", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({emails:selectedEmails})
  }).then(res=>res.json())
    .then(data=>alert("Alerts sent to: " + data.sent_to.join(", ")))
    .catch(err=>alert("Error sending alerts: "+err));
}

document.getElementById("searchInput").addEventListener("input", function() {
  const query = this.value.toLowerCase();
  filteredData = usersData.filter(user => 
    (user.name||"").toLowerCase().includes(query) ||
    (user.email||"").toLowerCase().includes(query) ||
    (user.city||"").toLowerCase().includes(query) ||
    (user.bloodGroup||"").toLowerCase().includes(query)
  );
  currentPage = 1;
  renderTable();
  renderPagination();
});

fetchUsers();
</script>
</body>
</html>
